<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UTRGV TV Signage - Login</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://www.google.com/recaptcha/api.js?render=6LfdDJMsAAAAAHluaBUckrIr1UHTHDgERaUKC2xy"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Red Hat Display', system-ui, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #CB4900 0%, #a63c00 100%);
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .auth-container { width: 100%; max-width: 420px; }
    .auth-card {
      background: white; border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,.25);
      padding: 48px 40px; animation: slideUp .5s ease-out;
    }
    @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo-icon { font-size: 48px; margin-bottom: 8px; }
    .logo h1 {
      font-size: 28px; font-weight: 700;
      background: linear-gradient(135deg, #CB4900 0%, #a63c00 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .logo p { color: #6b7280; font-size: 14px; margin-top: 4px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 14px; font-weight: 500; color: #374151; margin-bottom: 8px; }
    .form-group input {
      width: 100%; padding: 14px 16px; border: 2px solid #e5e7eb;
      border-radius: 12px; font-family: inherit; font-size: 15px; transition: all .2s; outline: none;
    }
    .form-group input:focus { border-color: #CB4900; box-shadow: 0 0 0 4px rgba(203,73,0,.1); }
    .form-group input::placeholder { color: #9ca3af; }
    .submit-btn {
      width: 100%; padding: 16px; border: none; border-radius: 12px;
      background: linear-gradient(135deg, #CB4900 0%, #a63c00 100%);
      color: white; font-family: inherit; font-size: 16px; font-weight: 600;
      cursor: pointer; transition: all .2s; margin-top: 8px;
    }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(203,73,0,.3); }
    .submit-btn:disabled { opacity: .7; cursor: not-allowed; transform: none; }
    .error-message {
      background: #fef2f2; border: 1px solid #fecaca; color: #dc2626;
      padding: 12px 16px; border-radius: 12px; font-size: 14px; margin-bottom: 20px; display: none;
    }
    .error-message.show { display: block; animation: shake .5s ease-in-out; }
    @keyframes shake { 0%,100% { transform:translateX(0); } 25% { transform:translateX(-5px); } 75% { transform:translateX(5px); } }
    .footer-text { text-align: center; margin-top: 24px; color: #6b7280; font-size: 13px; }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="logo">
        <div class="logo-icon" style="font-size:2rem;font-weight:700;letter-spacing:-1px;">UTRGV</div>
        <h1>TV Signage</h1>
        <p>Digital signage management</p>
      </div>
      <div id="errorMessage" class="error-message"></div>
      <form id="loginForm">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="you@utrgv.edu" required>
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required>
        </div>
        <button type="submit" class="submit-btn">Sign In</button>
      </form>
      <p class="footer-text">Contact your administrator for account access</p>
    </div>
  </div>
  <script>
    fetch('/api/auth/me', { credentials: 'same-origin' })
      .then(r => r.json()).then(data => { if (data) window.location.href = '/admin/'; });

    const loginForm = document.getElementById('loginForm');
    const errorMsg  = document.getElementById('errorMessage');

    loginForm.addEventListener('submit', async e => {
      e.preventDefault();
      const btn = loginForm.querySelector('button');
      btn.disabled = true; btn.textContent = 'Signing in...';
      errorMsg.classList.remove('show');
      try {
        const recaptchaToken = await grecaptcha.execute('6LfdDJMsAAAAAHluaBUckrIr1UHTHDgERaUKC2xy', { action: 'login' });
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({
            email: document.getElementById('loginEmail').value,
            password: document.getElementById('loginPassword').value,
            recaptchaToken,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error?.message || 'Login failed');
        window.location.href = '/admin/';
      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.classList.add('show');
        btn.disabled = false; btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
